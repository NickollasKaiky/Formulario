<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/froala-editor@latest/css/froala_editor.pkgd.min.css" rel="stylesheet"
        type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/froala-editor@latest/js/froala_editor.pkgd.min.js">
    </script>

</head>

<body>

    <form action="/submit" method="post">
        <h3>Cadastre-se</h3>

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="campo_nome" placeholder="nome completo">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="campo_data">
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="campo_email" placeholder="exemplo@email.com">
        </div>

        <div class="form-group">
            <label for="tel">Telefone:</label>
            <input type="tel" id="tel" name="campo_telefone" placeholder="(45) 98765-4321">
        </div>

        <div class="form-group">
            <label>Habilidades:</label>

            <label for="html" class="checkbox-option">
                <input type="checkbox" id="html" name="habilidades" value="HTML"> HTML
            </label>

            <label for="css" class="checkbox-option">
                <input type="checkbox" id="css" name="habilidades" value="CSS"> CSS
            </label>

            <label for="js" class="checkbox-option">
                <input type="checkbox" id="js" name="habilidades" value="JS"> JavaScript
            </label>

        </div>

        <div class="form-group">
            <label for="">Frequência de prática das habilidades:

                <label for="nunca" class="radio-option">
                    <input type="radio" id="nunca" name="frequencia" value="nunca"> Nunca
                </label>

                <label for="raramente" class="radio-option">
                    <input type="radio" id="raramente" name="frequencia" value="raramente"> Raramente
                </label>

                <label for="frequentemente" class="radio-option">
                    <input type="radio" id="frequentemente" name="frequencia" value="moderadamente"> Frequentemente
                </label>

                <label for="sempre" class="radio-option">
                    <input type="radio" id="sempre" name="frequencia" value="sempre"> Sempre
                </label>
            </label>

        </div>

        <div class="form-group">
            <label for="pais">País:</label>
            <select name="pais" id="pais">

                <option value="br">🇧🇷 Brasil</option>
                <option value="es">🇪🇸 Espanha</option>
                <option value="us">🇺🇲 Estados Unidos</option>
                <option value="it">🇮🇹 Itália</option>
                <option value="jp">🇯🇵 Japão</option>
                <option value="pt">🇵🇹 Portugal</option>

            </select>
        </div>

        <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" minlength="8" maxlength="16">
        </div>

        <div class="form-group">
            <label for="comentarios">Comentários:</label><br>
            <textarea id="comentarios" name="comentarios"></textarea>

            <script type="text/javascript"
                src="https://editor-latest.s3.amazonaws.com/v3/js/froala_editor.pkgd.min.js?v=1.0.0">
                </script>

            <script>
                new FroalaEditor('#comentarios', {toolbarInline: true, charCounterCount: false, toolbarVisibleWithoutSelection: true });
            </script>


        </div>

        <div class="form-group">

            <button type="submit">Enviar</button>
        </div>

    </form>

</body>

</html>
