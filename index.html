<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form action="/submit" method="post">
        <h3>Cadastre-se</h3>

        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="campo_nome" placeholder="nome completo">
        </div>

        <div class="form-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" name="campo_data">
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="campo_email">
        </div>

        <div class="form-group">
            <label >Habilidades:</label>

            <label for="html">
                <input type="checkbox" id="html" name="habilidades" value="HTML"> HTML
            </label>
            
            <label for="css">
                <input type="checkbox" id="css" name="habilidades" value="CSS"> CSS
            </label>

            <label for="js">
                 <input type="checkbox" id="js" name="habilidades" value="JS"> JavaScript
            </label>

        </div>

        <div class="form-group">
            <label for="pais">País:</label>
            <select name="pais" id="pais">

                <!-- Adicionar mais opcoes -->
                 <option value="br">🇧🇷 Brasil</option>
                 <option value="es">🇪🇸 Espanha</option>
                 <option value="us">🇺🇲 Estados Unidos</option>
                 <option value="it">🇮🇹 Itália</option>
                 <option value="jp">🇯🇵 Japão</option>
                 <option value="pt">🇵🇹 Portugal</option>
                 



            </select>
        </div>

        <div class="form-group">
            <label for="comentarios">Comentários:</label><br>
            <textarea name="comentarios" id="comentarios"></textarea>
        </div>

        <div class="form-group">

            <button type="submit">Enviar</button>
        </div>

    

    </form>
    
</body>
</html>
